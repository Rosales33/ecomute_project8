[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = ["venv", "ecomute.db"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "SIM"]
ignore = ["B008"]

[tool.ruff.lint.per-file-ignores]
"src/**/__init__.py" = ["F401"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
no_implicit_optional = true
check_untyped_defs = true
ignore_missing_imports = false
exclude = "(^venv/|^\\.ruff_cache/|^__pycache__/|ecomute\\.db$)"

[[tool.mypy.overrides]]
module = [
  "joblib",
  "sklearn",
  "sklearn.*",
  "streamlit",
]
ignore_missing_imports = true